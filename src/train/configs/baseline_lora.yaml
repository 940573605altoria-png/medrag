# 朴素 LoRA 基线（T018）—— constitution III 的固定基线之一（vanilla 零样本 + 朴素 LoRA）。
#
# 这是消融对照的"底座"：**不含任何创新**（B 双路融合关、C 退火定位关），只在基座上挂一个朴素 LoRA。
# 任何创新（B/C）的增益都要相对本基线、在固定测试集上、一次一变量地证明显著（见 eval/ablation.py）。
#
# 用法（AutoDL，LLaMA-Factory；ms-swift 等价改写）：
#   llamafactory-cli train src/train/configs/baseline_lora.yaml
# 4B 用于验证代码路径；真跑 30B 改 model_name_or_path + 上 ZeRO-2（deepspeed 字段，默认注释关）。

### 模型（基座，4B 验证 / 30B 真跑）
model_name_or_path: Qwen/Qwen3-VL-4B-Instruct
trust_remote_code: true

### 方法：朴素 LoRA（无任何创新开关）
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target: all          # 注意力+MLP 投影；不动视觉塔（创新 B 才改 modeling）

### 数据（占位：指向清洗后的 c CT-QA 训练子集；评估集 never-touched，不入此处）
dataset: medrag_ct_qa_train
template: qwen2_vl
cutoff_len: 2048
overwrite_cache: true
preprocessing_num_workers: 8

### 训练超参（朴素、保守，作可复现底座）
per_device_train_batch_size: 1
gradient_accumulation_steps: 16
learning_rate: 1.0e-4
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.03
bf16: true
seed: 42                   # 固定 seed，可复现（constitution III）

### 输出
output_dir: /root/autodl-tmp/runs/baseline_lora
logging_steps: 10
save_steps: 500
plot_loss: true
report_to: none

### 多卡（默认关；多卡时取消注释切 ZeRO-2，不上 ZeRO-3）
# deepspeed: src/train/configs/ds_zero2.json

### 创新开关（基线一律关；真实接入由 train_cb.py / modeling patch 控制）
# medrag_fusion: off        # B 双路融合：off | add | concat | multiimg
# medrag_loc_head: false    # C 定位头辅助损失
# medrag_sigma_anneal: false
